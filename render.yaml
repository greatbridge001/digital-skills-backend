services:
  - type: web
    name: smartfuture-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PAYHERO_USERNAME
        sync: false
      - key: PAYHERO_PASSWORD
        sync: false
      - key: PAYHERO_CHANNEL_ID
        sync: false
      - key: CALLBACK_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: PORT
        value: 4000
